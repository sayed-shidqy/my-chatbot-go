<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dark Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* Gradient Ungu ke Hijau Gelap sesuai request */
            background: linear-gradient(135deg, #1a0b2e 0%, #0d2e1a 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bot-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center font-sans text-gray-100">

    <div class="w-full max-w-lg h-[650px] glass-panel rounded-[2rem] shadow-2xl flex flex-col overflow-hidden m-4">
        <div class="p-6 border-b border-white/10 flex items-center gap-4">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse bot-glow"></div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Sayed AI <span class="text-xs font-light opacity-50 ml-2">v1.0</span></h1>
                <p class="text-xs text-green-400 font-mono italic">online_status: active</p>
            </div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="flex justify-start">
                <div class="bg-white/10 border border-white/10 px-4 py-2 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed">
                    Halo! Saya asisten virtual Anda. Ada yang bisa saya bantu hari ini?
                </div>
            </div>
        </div>

        <div class="p-6 bg-black/20">
            <div class="relative flex items-center">
                <input type="text" id="user-input" 
                    placeholder="Tanyakan sesuatu..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 pr-16 text-sm focus:outline-none focus:border-green-500/50 focus:ring-1 focus:ring-green-500/50 transition-all"
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" 
                    class="absolute right-2 bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all active:scale-95">
                    SEND
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const text = input.value;
            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-indigo-600/40 border border-indigo-400/30 px-4 py-2 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-lg">
                        ${text}
                    </div>
                </div>`;
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    body: JSON.stringify({ text: text }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();

                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white/10 border border-white/10 px-4 py-2 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed text-green-50 shadow-md">
                            ${data.text}
                        </div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                console.error("Error connecting to server");
            }
        }
    </script>
</body>
</html>
